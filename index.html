<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta http-equiv="refresh" content="0; url=./cello-trainer.html">
<title>Cello Trainer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e0e12;
    color: #e8e4dc;
    font-family: monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #2a2a38;
    border-top-color: #c8a96e;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { font-size: 0.75rem; letter-spacing: 0.15em; color: #6b6b80; text-transform: uppercase; }
  a { color: #c8a96e; }
</style>
</head>
<body>
<div class="spinner"></div>
<p>Loading…</p>
<p style="margin-top:8px; font-size:0.65rem;">
  Not redirecting? <a href="./cello-trainer.html">Click here</a>
</p>
