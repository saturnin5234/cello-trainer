<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bass Clef Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  :root {
    --bg: #0e0e12;
    --surface: #16161d;
    --surface2: #1e1e28;
    --border: #2a2a38;
    --accent: #c8a96e;
    --accent2: #7eb8c8;
    --text: #e8e4dc;
    --muted: #6b6b80;
    --correct: #6ec87e;
    --wrong: #c86e6e;
    --staff-line: #3a3a50;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 48px 0;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(200,169,110,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(126,184,200,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Menu Bar ── */
  .menu-bar {
    width: 100%;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 48px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .menu-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.04em;
  }

  .menu-nav {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .menu-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 12px;
    border: none;
    background: transparent;
    color: var(--muted);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .menu-btn:hover { background: var(--surface2); color: var(--text); }
  .menu-btn.active { color: var(--accent); }

  .menu-user {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .menu-username {
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    color: var(--accent2);
  }

  .menu-logout {
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 3px 8px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Mono', monospace;
  }
  .menu-logout:hover { color: var(--wrong); border-color: var(--wrong); }

  /* ── Page container ── */
  .page-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
    width: 100%;
  }

  /* ── Overlay panels ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    backdrop-filter: blur(4px);
  }
  .overlay.hidden { display: none; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 32px 28px;
    width: min(400px, 100%);
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .modal-subtitle {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: -8px;
  }

  .modal-tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
  }

  .modal-tab {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 5px 14px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--muted);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .modal-tab.active { border-color: var(--accent); color: var(--accent); }

  .modal-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .modal-label {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .modal-input {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .modal-input:focus { border-color: var(--accent); }

  .modal-submit {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 11px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 4px;
  }
  .modal-submit:hover { opacity: 0.85; }
  .modal-submit:disabled { opacity: 0.4; cursor: not-allowed; }

  .modal-msg {
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-align: center;
    min-height: 16px;
  }
  .modal-msg.ok  { color: var(--correct); }
  .modal-msg.err { color: var(--wrong); }

  .modal-close {
    position: absolute;
    top: 12px; right: 14px;
    background: none; border: none;
    color: var(--muted); font-size: 1.1rem;
    cursor: pointer; line-height: 1;
  }
  .modal-close:hover { color: var(--text); }

  /* ── Leaderboard panel ── */
  .leaderboard-panel {
    width: min(520px, 100%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px;
  }

  .lb-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .lb-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--accent);
  }

  .lb-refresh {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 3px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .lb-refresh:hover { border-color: var(--accent2); color: var(--accent2); }

  .lb-row {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 10px 4px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-row.me { background: rgba(200,169,110,0.06); border-radius: 4px; }

  .lb-rank {
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
  }
  .lb-rank.gold   { color: #f0c040; font-weight: 700; }
  .lb-rank.silver { color: #b0b8c8; font-weight: 700; }
  .lb-rank.bronze { color: #c8905a; font-weight: 700; }

  .lb-name {
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    color: var(--text);
  }
  .lb-name.me { color: var(--accent2); }

  .lb-score {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .lb-empty {
    text-align: center;
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    padding: 24px 0;
  }

  .lb-loading {
    text-align: center;
    color: var(--muted);
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 20px 0;
  }

  .hidden { display: none !important; }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 0.02em;
    text-align: center;
    margin-bottom: 4px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 32px;
    text-align: center;
  }

  .stats-bar {
    display: flex;
    gap: 32px;
    margin-bottom: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 28px;
  }

  .stat {
    text-align: center;
  }

  .stat-label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 2px;
  }

  .stat-value {
    font-size: 1.4rem;
    font-weight: 500;
    color: var(--text);
  }

  .stat-value.accent { color: var(--accent); }
  .stat-value.correct { color: var(--correct); }

  /* Score display */
  .score-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 28px 36px;
    margin-bottom: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    width: min(520px, 100%);
    overflow: visible;
  }

  .note-name-display {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    min-height: 48px;
    text-align: center;
    margin-bottom: 12px;
    transition: color 0.3s;
    letter-spacing: 0.05em;
  }

  .note-name-display.correct { color: var(--correct); }
  .note-name-display.wrong { color: var(--wrong); }
  .note-name-display.neutral { color: var(--text); }

  canvas#staffCanvas {
    display: block;
  }

  /* Range selector */
  .range-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .range-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .range-btn:hover { border-color: var(--accent); color: var(--accent); }
  .range-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  /* Piano keyboard */
  .keyboard-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px 24px 24px;
    width: min(680px, 100%);
    overflow-x: auto;
  }

  .keyboard-label {
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    text-align: center;
  }

  .keyboard {
    position: relative;
    display: flex;
    justify-content: center;
    user-select: none;
  }

  /* Single container that holds both white and black keys */
  .white-keys {
    display: flex;
    gap: 3px;
    position: relative; /* black keys are absolute children of this */
  }

  .key {
    cursor: pointer;
    border-radius: 0 0 5px 5px;
    transition: background 0.12s, transform 0.08s;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 8px;
    font-size: 0.6rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }

  .white-key {
    width: 36px;
    height: 140px;
    background: #f0ece4;
    border: 1px solid #999;
    color: #555;
    z-index: 1;
    flex-shrink: 0;
    position: relative;
  }

  .white-key:hover { background: #e8e0d0; }
  .white-key:active, .white-key.pressed { background: #d4c8a8; transform: translateY(2px); }
  .white-key.highlight { background: var(--accent2); }
  .white-key.correct-flash { background: var(--correct) !important; }
  .white-key.wrong-flash { background: var(--wrong) !important; }

  .black-key {
    position: absolute;
    top: 0;
    width: 22px;
    height: 88px;
    background: #1a1a22;
    border: 1px solid #000;
    border-radius: 0 0 4px 4px;
    z-index: 2;
    color: #777;
    padding-bottom: 6px;
  }

  .black-key:hover { background: #2a2a34; }
  .black-key:active, .black-key.pressed { background: #3a3a44; transform: translateY(2px); }
  .black-key.correct-flash { background: #3a8a4a !important; }
  .black-key.wrong-flash { background: #8a3a3a !important; }

  /* Feedback */
  .feedback-msg {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    min-height: 20px;
    text-align: center;
    margin-top: 12px;
    transition: opacity 0.3s;
  }

  .skip-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 8px 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 3px;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.2s;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }

  .skip-btn:hover { border-color: var(--muted); color: var(--text); }

  .ledger-info {
    font-size: 0.62rem;
    color: var(--muted);
    text-align: center;
    margin-top: 6px;
    letter-spacing: 0.08em;
  }

  .key-name-display {
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-top: 6px;
    min-height: 16px;
    text-align: center;
  }

  /* Input mode toggle */
  .input-mode {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    align-items: center;
  }

  .mode-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 7px 16px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .mode-btn.active { background: var(--accent2); color: var(--bg); border-color: var(--accent2); }

  /* Tuner panel */
  .tuner-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 18px 24px 20px;
    width: min(680px, 100%);
    margin-bottom: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .tuner-panel.visible { display: flex; }

  .tuner-label {
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }

  .tuner-note {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 700;
    color: var(--muted);
    min-width: 80px;
    text-align: center;
    transition: color 0.15s;
    letter-spacing: 0.05em;
  }
  .tuner-note.hearing  { color: var(--accent2); }
  .tuner-note.matched  { color: var(--correct);  }

  .tuner-meter {
    width: 100%;
    max-width: 340px;
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .tuner-meter-fill {
    height: 100%;
    width: 0%;
    background: var(--accent2);
    border-radius: 4px;
    transition: width 0.1s, background 0.2s;
  }
  .tuner-meter-fill.strong { background: var(--correct); }

  .tuner-hint {
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-align: center;
  }

  .mic-status {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 2px;
    background: var(--surface2);
    color: var(--muted);
  }
  .mic-status.on  { background: rgba(110,200,126,0.15); color: var(--correct); }
  .mic-status.err { background: rgba(200,110,110,0.15); color: var(--wrong);   }
</style>
</head>
<body>

<!-- ── Menu Bar ── -->
<nav class="menu-bar">
  <span class="menu-logo">🎻 Bass Clef Trainer</span>
  <div class="menu-nav">
    <button class="menu-btn active" id="menuGame" onclick="showPage('game')">Practice</button>
    <button class="menu-btn" id="menuLeaderboard" onclick="showPage('leaderboard')">Leaderboard</button>
  </div>
  <div class="menu-user" id="menuUserArea">
    <button class="menu-btn" id="menuAuthBtn" onclick="openAuthModal()">Sign In</button>
  </div>
</nav>

<!-- ── Auth Modal ── -->
<div class="overlay hidden" id="authOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeAuthModal()">✕</button>
    <div class="modal-title">Welcome</div>
    <p class="modal-subtitle">Sign in to save your scores</p>
    <div class="modal-tabs">
      <button class="modal-tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
      <button class="modal-tab" id="tabRegister" onclick="switchTab('register')">Register</button>
    </div>
    <div class="modal-field">
      <label class="modal-label">Username</label>
      <input class="modal-input" id="authUsername" type="text" placeholder="your_username" autocomplete="username" />
    </div>
    <div class="modal-field">
      <label class="modal-label">Password</label>
      <input class="modal-input" id="authPassword" type="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <p class="modal-msg" id="authMsg"></p>
    <button class="modal-submit" id="authSubmit" onclick="submitAuth()">Sign In</button>
  </div>
</div>

<!-- ── Pages ── -->
<div class="page-content" id="pageGame">

<h1>Bass Clef Trainer</h1>
<p class="subtitle">Note recognition for cello · Bass clef</p>

<div class="stats-bar">
  <div class="stat">
    <span class="stat-label">Score</span>
    <span class="stat-value accent" id="scoreVal">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Correct</span>
    <span class="stat-value correct" id="correctVal">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Streak</span>
    <span class="stat-value" id="streakVal">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Accuracy</span>
    <span class="stat-value" id="accuracyVal">—</span>
  </div>
</div>

<div class="input-mode">
  <button class="mode-btn active" id="modeKeyboard">⌨ Keyboard</button>
  <button class="mode-btn" id="modeMic">🎻 Cello Mic</button>
</div>

<div class="range-selector">
  <button class="range-btn active" data-range="beginner">Beginner</button>
  <button class="range-btn" data-range="intermediate">Intermediate</button>
  <button class="range-btn" data-range="full">Full Cello</button>
</div>

<div class="score-area">
  <div class="note-name-display neutral" id="noteDisplay">—</div>
  <canvas id="staffCanvas" width="460" height="160"></canvas>
  <p class="key-name-display" id="keyNameDisplay"></p>
  <p class="ledger-info" id="ledgerInfo"></p>
  <p class="feedback-msg" id="feedbackMsg"></p>
  <button class="skip-btn" id="skipBtn">Skip →</button>
</div>

<div class="keyboard-wrapper" id="keyboard-wrapper-id">
  <p class="keyboard-label">Click or press your keyboard to answer</p>
  <div class="keyboard">
    <div class="white-keys" id="whiteKeys"></div>
  </div>
</div>

<div class="tuner-panel" id="tunerPanel">
  <div style="display:flex;align-items:center;gap:12px;">
    <p class="tuner-label">Listening for your cello</p>
    <span class="mic-status" id="micStatus">off</span>
  </div>
  <div class="tuner-note" id="tunerNote">—</div>
  <div class="tuner-meter"><div class="tuner-meter-fill" id="tunerFill"></div></div>
  <p class="tuner-hint" id="tunerHint">Play a note on your cello — hold it steady</p>
</div>

</div> <!-- end #pageGame -->

<!-- ── Leaderboard Page ── -->
<div class="page-content hidden" id="pageLeaderboard">
  <div class="leaderboard-panel">
    <div class="lb-header">
      <span class="lb-title">Leaderboard</span>
      <button class="lb-refresh" onclick="loadLeaderboard()">↻ Refresh</button>
    </div>
    <div id="lbContent"><p class="lb-loading">Loading…</p></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════════════════════════

// Staff positions in bass clef (0 = bottom line G2, each 0.5 = one step up)
// Lines: 0=G2, 1=B2, 2=D3, 3=F3, 4=A3
// Spaces: 0.5=A2, 1.5=C3, 2.5=E3, 3.5=G3, 4.5=B3
// Ledger above: 5=C4, 5.5=D4, 6=E4, 6.5=F4
// Ledger below: -0.5=F2, -1=E2, -1.5=D2, -2=C2
const NATURAL_NOTES = [
  { name:'C', octave:2, pos:-2   },
  { name:'D', octave:2, pos:-1.5 },
  { name:'E', octave:2, pos:-1   },
  { name:'F', octave:2, pos:-0.5 },
  { name:'G', octave:2, pos:0    },
  { name:'A', octave:2, pos:0.5  },
  { name:'B', octave:2, pos:1    },
  { name:'C', octave:3, pos:1.5  },
  { name:'D', octave:3, pos:2    },
  { name:'E', octave:3, pos:2.5  },
  { name:'F', octave:3, pos:3    },
  { name:'G', octave:3, pos:3.5  },
  { name:'A', octave:3, pos:4    },
  { name:'B', octave:3, pos:4.5  },
  { name:'C', octave:4, pos:5    },
  { name:'D', octave:4, pos:5.5  },
  { name:'E', octave:4, pos:6    },
  { name:'F', octave:4, pos:6.5  },
];

// Subset pools by range (using pos range)
const POOL_BEGINNER     = NATURAL_NOTES.filter(n => n.pos >= 0 && n.pos <= 4);
const POOL_INTERMEDIATE = NATURAL_NOTES.filter(n => n.pos >= -1 && n.pos <= 5.5);
const POOL_FULL         = NATURAL_NOTES; // all notes

// Key signatures for Full Cello mode
// Each key: name, sharps/flats array (note letters affected), symbol '#' or 'b'
// Bass clef key sig positions (staff pos) for sharps: F3(3), C4(5→shown at 1.5 in bass), G3(3.5), D4(5.5→2), A3(4), E4(6→3?), B3(4.5)
// Standard bass clef sharp positions (staff pos): F=3, C=1.5, G=3.5, D=2, A=4, E=2.5, B=1
// Standard bass clef flat positions:  Bb=1, Eb=2.5, Ab=0.5, Db=2, Gb=3.5, Cb=1.5, Fb=3
const KEY_SIGNATURES = [
  { name: 'C major',  sharps: [], flats: [],                   symbol: null },
  { name: 'G major',  sharps: ['F'], flats: [],                symbol: '#',  sigPos: [3]               },
  { name: 'D major',  sharps: ['F','C'], flats: [],            symbol: '#',  sigPos: [3, 1.5]          },
  { name: 'A major',  sharps: ['F','C','G'], flats: [],        symbol: '#',  sigPos: [3, 1.5, 3.5]    },
  { name: 'F major',  sharps: [], flats: ['B'],                symbol: 'b',  sigPos: [1]               },
  { name: 'Bb major', sharps: [], flats: ['B','E'],            symbol: 'b',  sigPos: [1, 2.5]          },
  { name: 'Eb major', sharps: [], flats: ['B','E','A'],        symbol: 'b',  sigPos: [1, 2.5, 0.5]    },
];

// Piano keyboard data: C2 to F4
const allWhite = [];
const allBlack = [];
const WHITE_NOTES = ['C','D','E','F','G','A','B'];
const WHITE_SEMIS = [0,2,4,5,7,9,11];
const BLACK_AFTER = { 1:'C#', 3:'D#', 6:'F#', 8:'G#', 10:'A#' }; // semitone → name

for (let oct = 2; oct <= 4; oct++) {
  for (let si = 0; si < 12; si++) {
    if (oct === 4 && si > 6) break; // stop after F#4
    const wi = WHITE_SEMIS.indexOf(si);
    if (wi !== -1) {
      allWhite.push({ note: WHITE_NOTES[wi], octave: oct });
    } else if (BLACK_AFTER[si]) {
      allBlack.push({ note: BLACK_AFTER[si], octave: oct, afterWhite: allWhite.length - 1 });
    }
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════════════
let score = 0, correct = 0, total = 0, streak = 0;
let currentNote = null;      // { name, octave, pos, accidental }  accidental: null | '#' | 'b'
let currentKey = KEY_SIGNATURES[0];
let answering = true;
let range = 'beginner';
let feedbackTimeout = null;

// The "target" key on the piano: { note, accidental }
// e.g. { note:'F', accidental:'#' } means the player must press F#
let targetPiano = null;

// ══════════════════════════════════════════════════════════════════════════════
// NOTE GENERATION
// ══════════════════════════════════════════════════════════════════════════════

function getPool() {
  if (range === 'beginner')     return POOL_BEGINNER;
  if (range === 'intermediate') return POOL_INTERMEDIATE;
  return POOL_FULL;
}

function nextNote() {
  const pool = getPool();

  // Pick a new key sig for full cello
  if (range === 'full') {
    currentKey = KEY_SIGNATURES[Math.floor(Math.random() * KEY_SIGNATURES.length)];
  } else {
    currentKey = KEY_SIGNATURES[0]; // C major (no accidentals in key sig)
  }

  // Pick base note
  let base;
  do {
    base = pool[Math.floor(Math.random() * pool.length)];
  } while (pool.length > 1 && currentNote && base.name === currentNote.name && base.octave === currentNote.octave);

  // Determine accidental
  let accidental = null;

  if (range === 'intermediate') {
    // 40% chance of accidental (sharp or flat), but only for notes that have a valid black key
    // Notes that can be sharped: C D F G A  (E# and B# are unusual, skip)
    // Notes that can be flatted: D E G A B
    const canSharp = ['C','D','F','G','A'].includes(base.name);
    const canFlat  = ['D','E','G','A','B'].includes(base.name);
    const options = ['natural'];
    if (canSharp) options.push('#');
    if (canFlat)  options.push('b');
    const pick = options[Math.floor(Math.random() * options.length)];
    if (pick !== 'natural') accidental = pick;
  }

  if (range === 'full') {
    // Key signature may force an accidental on this note
    // Additionally 25% chance of an explicit accidental written on the note
    const keyAcc = currentKey.sharps.includes(base.name) ? '#'
                 : currentKey.flats.includes(base.name)  ? 'b'
                 : null;

    // 25% chance to add a written accidental (only on notes not already affected by key sig)
    let writtenAcc = null;
    if (!keyAcc) {
      const canSharp = ['C','D','F','G','A'].includes(base.name);
      const canFlat  = ['D','E','G','A','B'].includes(base.name);
      if (Math.random() < 0.3) {
        const opts = [];
        if (canSharp) opts.push('#');
        if (canFlat)  opts.push('b');
        if (opts.length) writtenAcc = opts[Math.floor(Math.random() * opts.length)];
      }
    }
    accidental = writtenAcc; // the written accidental on the note itself (key sig handled separately)
  }

  // Compute what key the player must press
  // In full mode, if key sig has this note sharp/flat AND no written accidental overrides it:
  let pianoNote = base.name;
  let pianoAcc = null;

  if (range === 'full') {
    const keyAcc = currentKey.sharps.includes(base.name) ? '#'
                 : currentKey.flats.includes(base.name)  ? 'b'
                 : null;
    // Written accidental overrides key sig; if no written acc, key sig applies
    pianoAcc = accidental !== null ? accidental : keyAcc;
  } else {
    pianoAcc = accidental;
  }

  targetPiano = { note: pianoNote, accidental: pianoAcc };
  currentNote = { ...base, accidental };

  answering = true;
  document.getElementById('noteDisplay').className = 'note-name-display neutral';
  document.getElementById('noteDisplay').textContent = '?';
  document.getElementById('feedbackMsg').textContent = '';
  document.getElementById('feedbackMsg').style.color = '';
  document.getElementById('ledgerInfo').textContent = '';
  document.getElementById('keyNameDisplay').textContent =
    (range === 'full' && currentKey.name !== 'C major') ? `Key: ${currentKey.name}` : '';
  drawStaff();
  updateKeyHighlights();
}

// ══════════════════════════════════════════════════════════════════════════════
// CANVAS — STAFF DRAWING
// ══════════════════════════════════════════════════════════════════════════════

function drawStaff() {
  const canvas = document.getElementById('staffCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const LS = 20; // line spacing px

  // Work out how much vertical space the note needs
  const pos = currentNote ? currentNote.pos : 2;
  // noteY relative to bottomLineY = -pos*LS
  // bottomLineY = staffTop + 4*LS
  // So noteY = staffTop + (4 - pos)*LS
  // We need padding above the highest point and below the lowest point.
  const PAD = 28; // px padding above/below note extremes

  // The note's y offset from the top of the canvas:
  //   staffTop + (4 - pos)*LS  must be >= PAD
  //   => staffTop >= PAD - (4 - pos)*LS
  // Also staffTop must leave room for 4 lines below:
  //   staffTop + 4*LS + PAD <= H
  //   => staffTop <= H - 4*LS - PAD

  // Calculate minimum staffTop needed so note isn't cropped at top
  const minStaffTop = PAD - (4 - pos) * LS;
  // Use at least minStaffTop, but keep staff reasonably centred otherwise
  const staffTop = Math.max(minStaffTop, PAD);

  // Canvas height: enough to fit staff + note + padding below
  const noteOffsetFromTop = staffTop + (4 - pos) * LS;
  const H = Math.max(160, noteOffsetFromTop + PAD + 8);
  canvas.height = H;

  ctx.clearRect(0, 0, W, H);

  const staffLeft = 14;
  const staffRight = W - 20;
  const bottomLineY = staffTop + 4 * LS;

  // ── Staff lines ──
  ctx.strokeStyle = '#4a4a62';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 5; i++) {
    const y = staffTop + i * LS;
    ctx.beginPath();
    ctx.moveTo(staffLeft, y);
    ctx.lineTo(staffRight, y);
    ctx.stroke();
  }

  // ── Bass clef ──
  ctx.fillStyle = '#c8a96e';
  ctx.font = `bold ${LS * 5.5}px serif`;
  ctx.fillText('𝄢', staffLeft - 2, staffTop + LS * 4.1);
  let cursorX = staffLeft + 82;
  // ── Key signature ──
  if (currentKey && (currentKey.sharps.length > 0 || currentKey.flats.length > 0)) {
    ctx.fillStyle = '#e8e4dc';
    ctx.font = `bold ${LS * 1.6}px serif`;
    const sym = currentKey.symbol;
    currentKey.sigPos.forEach(pos => {
      const y = bottomLineY - pos * LS;
      const sigSym = currentKey.symbol === '#' ? '♯' : '♭';
      ctx.fillText(sigSym, cursorX, y + 6);
      cursorX += currentKey.symbol === '#' ? 18 : 22;
    });
    cursorX += 16;
  }

  if (!currentNote) return;

  // ── Note position ──
  const noteX = cursorX + (staffRight - cursorX) / 2;
  const noteY = bottomLineY - currentNote.pos * LS;

  // ── Ledger lines ──
  ctx.strokeStyle = '#4a4a62';
  ctx.lineWidth = 1.5;
  const ledgerW = 28;
  if (currentNote.pos <= -1) {
    for (let p = -1; p >= Math.floor(currentNote.pos); p--) {
      const ly = bottomLineY - p * LS;
      ctx.beginPath(); ctx.moveTo(noteX - ledgerW/2 - 4, ly); ctx.lineTo(noteX + ledgerW/2 + 4, ly); ctx.stroke();
    }
  }
  if (currentNote.pos >= 5) {
    for (let p = 5; p <= Math.ceil(currentNote.pos); p++) {
      const ly = bottomLineY - p * LS;
      ctx.beginPath(); ctx.moveTo(noteX - ledgerW/2 - 4, ly); ctx.lineTo(noteX + ledgerW/2 + 4, ly); ctx.stroke();
    }
  }

  // ── Accidental on note ──
  if (currentNote.accidental) {
    ctx.fillStyle = '#e8e4dc';
    ctx.font = `bold ${LS * 1.55}px serif`;
    const sym = currentNote.accidental === '#' ? '♯' : '♭';
    const accOffset = currentNote.accidental === '#' ? 42 : 52;
    ctx.fillText(sym, noteX - accOffset, noteY + 6);
  }

  // ── Note head ──
  ctx.save();
  ctx.translate(noteX, noteY);
  ctx.rotate(-0.15);
  ctx.beginPath();
  ctx.ellipse(0, 0, 10, 7.5, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#e8e4dc';
  ctx.fill();
  ctx.restore();

  // ── Stem ──
  ctx.strokeStyle = '#e8e4dc';
  ctx.lineWidth = 1.5;
  const stemLen = LS * 3.5;
  if (currentNote.pos < 2) {
    ctx.beginPath(); ctx.moveTo(noteX + 10, noteY); ctx.lineTo(noteX + 10, noteY - stemLen); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(noteX - 10, noteY); ctx.lineTo(noteX - 10, noteY + stemLen); ctx.stroke();
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// PIANO BUILD
// ══════════════════════════════════════════════════════════════════════════════

function buildPiano() {
  const container = document.getElementById('whiteKeys');
  container.innerHTML = '';
  const KEY_W = 36, KEY_GAP = 3, STEP = KEY_W + KEY_GAP;

  allWhite.forEach((k, idx) => {
    const el = document.createElement('div');
    el.className = 'key white-key';
    el.dataset.note = k.note;
    el.dataset.octave = k.octave;
    el.dataset.acc = '';
    el.innerHTML = `<span>${k.note}<sub>${k.octave}</sub></span>`;
    el.addEventListener('click', () => handleAnswer(k.note, null, el));
    container.appendChild(el);
  });

  allBlack.forEach((k) => {
    const el = document.createElement('div');
    el.className = 'key black-key';
    el.dataset.note = k.note[0]; // letter only e.g. 'C'
    el.dataset.acc = '#';
    el.dataset.octave = k.octave;
    const x = k.afterWhite * STEP + KEY_W - 11;
    el.style.left = x + 'px';
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      handleAnswer(k.note[0], '#', el);
    });
    container.appendChild(el);
  });
}

// Grey-out non-relevant keys and highlight the target area subtly
function updateKeyHighlights() {
  // Reset all keys
  document.querySelectorAll('.key').forEach(el => {
    el.style.opacity = '';
  });
}

// ══════════════════════════════════════════════════════════════════════════════
// ANSWER HANDLING
// ══════════════════════════════════════════════════════════════════════════════

function targetLabel() {
  if (!targetPiano) return '';
  const acc = targetPiano.accidental === '#' ? '♯' : targetPiano.accidental === 'b' ? '♭' : '';
  return targetPiano.note + acc;
}

// Enharmonic equivalents: flat → sharp (note + accidental → note + accidental)
const ENHARMONIC = {
  'Db': 'C#', 'Eb': 'D#', 'Fb': 'E',  'Gb': 'F#',
  'Ab': 'G#', 'Bb': 'A#', 'Cb': 'B',
};

function toSharpKey(note, accidental) {
  // Returns { note, accidental } normalised to sharp/natural (what the piano keys use)
  if (accidental === 'b') {
    const flat = note + 'b';
    const sharp = ENHARMONIC[flat];
    if (sharp) {
      if (sharp.length === 2) return { note: sharp[0], accidental: '#' };
      return { note: sharp, accidental: null }; // e.g. Fb → E (natural)
    }
  }
  return { note, accidental: accidental || null };
}

function handleAnswer(noteName, accidental, el) {
  if (!answering || !currentNote) return;
  answering = false;
  total++;

  // Normalise the target to sharp/natural so it matches piano keys
  const target  = toSharpKey(targetPiano.note, targetPiano.accidental);
  const played  = { note: noteName, accidental: accidental || null };
  const isCorrect = played.note === target.note && played.accidental === target.accidental;

  el.classList.add(isCorrect ? 'correct-flash' : 'wrong-flash');
  setTimeout(() => el.classList.remove('correct-flash', 'wrong-flash'), 600);

  const display  = document.getElementById('noteDisplay');
  const feedback = document.getElementById('feedbackMsg');
  const ledger   = document.getElementById('ledgerInfo');

  const playedLabel  = noteName + (accidental === '#' ? '♯' : '');
  const correctLabel = targetLabel();

  if (isCorrect) {
    correct++; streak++;
    score += Math.max(10, 10 + streak * 2);
    display.textContent = correctLabel;
    display.className = 'note-name-display correct';
    feedback.textContent = streak > 2 ? `✓ Correct! ${streak} in a row!` : '✓ Correct!';
    feedback.style.color = 'var(--correct)';
  } else {
    streak = 0;
    display.textContent = correctLabel;
    display.className = 'note-name-display wrong';
    feedback.textContent = `✗ You played ${playedLabel} — answer: ${correctLabel}`;
    feedback.style.color = 'var(--wrong)';
    ledger.textContent = positionHint(currentNote);
  }

  updateStats();
  clearTimeout(feedbackTimeout);
  feedbackTimeout = setTimeout(nextNote, isCorrect ? 900 : 1800);
}

function positionHint(note) {
  const hints = {
    'C2': 'Low C — 2 ledger lines below', 'D2': 'Below staff', 'E2': 'Ledger line below',
    'F2': 'Space below staff', 'G2': 'Bottom line', 'A2': 'First space',
    'B2': 'Second line', 'C3': 'Second space', 'D3': 'Middle line',
    'E3': 'Third space', 'F3': 'Fourth line', 'G3': 'Fourth space',
    'A3': 'Top line', 'B3': 'Above top line', 'C4': 'Middle C — ledger line above',
    'D4': 'Above middle C ledger', 'E4': 'Two spaces above staff', 'F4': 'Three above staff',
  };
  return hints[`${note.name}${note.octave}`] || '';
}

function updateStats() {
  document.getElementById('scoreVal').textContent    = score;
  document.getElementById('correctVal').textContent  = correct;
  document.getElementById('streakVal').textContent   = streak;
  document.getElementById('accuracyVal').textContent = total > 0
    ? Math.round(correct / total * 100) + '%' : '—';
  maybeSubmitScore();
}

// ══════════════════════════════════════════════════════════════════════════════
// UI CONTROLS
// ══════════════════════════════════════════════════════════════════════════════

document.querySelectorAll('.range-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    range = btn.dataset.range;
    nextNote();
  });
});

document.getElementById('skipBtn').addEventListener('click', () => {
  if (!currentNote) return;
  answering = false;
  const display = document.getElementById('noteDisplay');
  display.textContent = targetLabel();
  display.className = 'note-name-display neutral';
  document.getElementById('feedbackMsg').textContent = `Skipped — it was ${targetLabel()}`;
  document.getElementById('feedbackMsg').style.color = 'var(--muted)';
  document.getElementById('ledgerInfo').textContent = positionHint(currentNote);
  clearTimeout(feedbackTimeout);
  feedbackTimeout = setTimeout(nextNote, 1500);
});

// ── Keyboard shortcut: letter keys for natural notes ──
const keyMap = { 'a':'A','b':'B','c':'C','d':'D','e':'E','f':'F','g':'G' };
document.addEventListener('keydown', e => {
  const note = keyMap[e.key.toLowerCase()];
  if (!note || !answering || !currentNote) return;
  const candidates = allWhite.filter(k => k.note === note);
  if (!candidates.length) return;
  const idx = allWhite.indexOf(candidates[0]);
  const el = document.getElementById('whiteKeys').children[idx];
  handleAnswer(note, null, el);
});

// ══════════════════════════════════════════════════════════════════════════════
// MIC / PITCH DETECTION
// ══════════════════════════════════════════════════════════════════════════════

let micMode = false;
let audioCtx = null, analyser = null, micStream = null, pitchRaf = null;

// All chromatic notes with frequencies for cello range C2–F#4
// We'll compute by MIDI note number: freq = 440 * 2^((midi-69)/12)
const MIDI_NOTES = [];
for (let midi = 36; midi <= 66; midi++) { // C2=36, F#4=66
  const freq = 440 * Math.pow(2, (midi - 69) / 12);
  const noteNames12 = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const name = noteNames12[midi % 12];
  const oct  = Math.floor(midi / 12) - 1;
  MIDI_NOTES.push({ midi, freq, name, oct });
}

// Autocorrelation pitch detection
function detectPitch(buf, sampleRate) {
  const SIZE = buf.length;
  const MAX_SAMPLES = Math.floor(SIZE / 2);
  const MIN_FREQ = 60, MAX_FREQ = 400; // cello range

  let bestOffset = -1, bestCorr = 0;
  let lastCorr = 1, foundGoodCorr = false;
  const threshold = 0.9;

  const minOffset = Math.floor(sampleRate / MAX_FREQ);
  const maxOffset = Math.floor(sampleRate / MIN_FREQ);

  for (let offset = minOffset; offset <= Math.min(maxOffset, MAX_SAMPLES); offset++) {
    let corr = 0;
    for (let i = 0; i < MAX_SAMPLES; i++) {
      corr += Math.abs(buf[i] - buf[i + offset]);
    }
    corr = 1 - corr / MAX_SAMPLES;

    if (corr > threshold && corr > lastCorr) {
      foundGoodCorr = true;
      if (corr > bestCorr) {
        bestCorr = corr;
        bestOffset = offset;
      }
    } else if (foundGoodCorr) {
      // Parabolic interpolation for sub-sample accuracy
      const x1 = bestOffset - 1, x2 = bestOffset, x3 = bestOffset + 1;
      let y1 = 0, y2 = bestCorr, y3 = 0;
      // recalculate neighbours
      for (let i = 0; i < MAX_SAMPLES; i++) {
        y1 += Math.abs(buf[i] - buf[i + x1]);
        y3 += Math.abs(buf[i] - buf[i + x3]);
      }
      y1 = 1 - y1 / MAX_SAMPLES;
      y3 = 1 - y3 / MAX_SAMPLES;
      const denom = 2 * (2 * y2 - y1 - y3);
      const refinedOffset = denom !== 0 ? x2 + (y1 - y3) / denom : x2;
      return { freq: sampleRate / refinedOffset, confidence: bestCorr };
    }
    lastCorr = corr;
  }
  return null;
}

// Match a frequency to the nearest MIDI note
function freqToNote(freq) {
  if (!freq || freq < 55 || freq > 420) return null;
  let best = null, bestDist = Infinity;
  for (const n of MIDI_NOTES) {
    const dist = Math.abs(n.freq - freq);
    if (dist < bestDist) { bestDist = dist; best = n; }
  }
  // Only return if within ~50 cents (half semitone)
  if (bestDist / best.freq > 0.03) return null;
  return best;
}

// How many cents off are we?
function centsDiff(freq, targetFreq) {
  return 1200 * Math.log2(freq / targetFreq);
}

// Pitch detection loop
let pitchHistory = []; // rolling buffer of last N detections for stability
const PITCH_STABILITY_FRAMES = 6; // need this many frames on the same note

function startPitchLoop() {
  if (!analyser) return;
  const buf = new Float32Array(analyser.fftSize);

  function loop() {
    pitchRaf = requestAnimationFrame(loop);
    analyser.getFloatTimeDomainData(buf);

    // RMS — check if there's enough signal
    let rms = 0;
    for (let i = 0; i < buf.length; i++) rms += buf[i] * buf[i];
    rms = Math.sqrt(rms / buf.length);

    const tunerNote = document.getElementById('tunerNote');
    const tunerFill = document.getElementById('tunerFill');
    const tunerHint = document.getElementById('tunerHint');

    if (rms < 0.01) {
      tunerNote.textContent = '—';
      tunerNote.className = 'tuner-note';
      tunerFill.style.width = '0%';
      tunerFill.className = 'tuner-meter-fill';
      tunerHint.textContent = 'Play a note on your cello — hold it steady';
      pitchHistory = [];
      return;
    }

    const result = detectPitch(buf, audioCtx.sampleRate);
    if (!result || result.confidence < 0.88) {
      pitchHistory = [];
      return;
    }

    const detected = freqToNote(result.freq);
    if (!detected) { pitchHistory = []; return; }

    // Show detected note live
    const acc = detected.name.includes('#') ? '♯' : '';
    const baseName = detected.name.replace('#','');
    tunerNote.textContent = baseName + acc + detected.oct;
    tunerNote.className = 'tuner-note hearing';

    // Volume bar
    const vol = Math.min(100, Math.round(rms * 400));
    tunerFill.style.width = vol + '%';

    // Stability: collect name+octave into history
    const detectedId = detected.name + detected.oct; // e.g. "G#3"
    pitchHistory.push(detectedId);
    if (pitchHistory.length > PITCH_STABILITY_FRAMES * 2) pitchHistory.shift();

    // Check if last N frames all agree
    const recent = pitchHistory.slice(-PITCH_STABILITY_FRAMES);
    const allSame = recent.length === PITCH_STABILITY_FRAMES && recent.every(n => n === recent[0]);

    if (allSame && answering && currentNote) {
      // Match against target (enharmonic-aware, octave-aware)
      const target = toSharpKey(targetPiano.note, targetPiano.accidental);
      const detectedSharp = toSharpKey(baseName, detected.name.includes('#') ? '#' : null);

      const isMatch = detectedSharp.note === target.note &&
                      detectedSharp.accidental === target.accidental &&
                      detected.oct === currentNote.octave;

      if (isMatch) {
        tunerNote.className = 'tuner-note matched';
        tunerFill.className = 'tuner-meter-fill strong';
        tunerHint.textContent = '✓ Correct!';
        pitchHistory = [];
        const keyEls = Array.from(document.querySelectorAll('.key'));
        const matchEl = keyEls.find(el => {
          const n = el.dataset.note;
          const a = el.dataset.acc || null;
          return n === target.note && (a === '#') === (target.accidental === '#');
        }) || keyEls[0];
        handleAnswer(target.note, target.accidental || null, matchEl);
      } else {
        // Tell the player what's wrong — wrong octave or wrong note
        const rightNote = detectedSharp.note === target.note && detectedSharp.accidental === target.accidental;
        if (rightNote && detected.oct !== currentNote.octave) {
          tunerHint.textContent = `Right note, wrong octave — need ${currentNote.name}${currentNote.octave}`;
        } else {
          tunerHint.textContent = `Hearing ${baseName}${acc}${detected.oct} — keep trying`;
        }
      }
    } else if (!allSame) {
      tunerHint.textContent = 'Hold the note steady…';
    }
  }
  loop();
}

async function startMic() {
  const statusEl = document.getElementById('micStatus');
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(micStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 4096;
    analyser.smoothingTimeConstant = 0.3;
    source.connect(analyser);
    statusEl.textContent = 'live';
    statusEl.className = 'mic-status on';
    startPitchLoop();
  } catch (e) {
    statusEl.textContent = 'error — allow mic access';
    statusEl.className = 'mic-status err';
    document.getElementById('tunerHint').textContent = 'Microphone access denied. Please allow it in your browser.';
    micMode = false;
    document.getElementById('modeKeyboard').classList.add('active');
    document.getElementById('modeMic').classList.remove('active');
  }
}

function stopMic() {
  if (pitchRaf) { cancelAnimationFrame(pitchRaf); pitchRaf = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (audioCtx)  { audioCtx.close(); audioCtx = null; }
  analyser = null;
  pitchHistory = [];
  document.getElementById('micStatus').textContent = 'off';
  document.getElementById('micStatus').className = 'mic-status';
}

document.getElementById('modeKeyboard').addEventListener('click', () => {
  if (!micMode) return;
  micMode = false;
  stopMic();
  document.getElementById('modeKeyboard').classList.add('active');
  document.getElementById('modeMic').classList.remove('active');
  document.getElementById('tunerPanel').classList.remove('visible');
  document.getElementById('keyboard-wrapper-id').classList.remove('hidden');
});

document.getElementById('modeMic').addEventListener('click', () => {
  if (micMode) return;
  micMode = true;
  document.getElementById('modeMic').classList.add('active');
  document.getElementById('modeKeyboard').classList.remove('active');
  document.getElementById('tunerPanel').classList.add('visible');
  document.getElementById('keyboard-wrapper-id').classList.add('hidden');
  startMic();
});

// ══════════════════════════════════════════════════════════════════════════════
// JSONBIN CONFIGURATION — credentials loaded from config.js
// ══════════════════════════════════════════════════════════════════════════════
const _API_KEY = (typeof JSONBIN_API_KEY !== 'undefined') ? JSONBIN_API_KEY : '';
const _BIN_ID  = (typeof JSONBIN_BIN_ID  !== 'undefined') ? JSONBIN_BIN_ID  : '';
const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${_BIN_ID}`;

// ── Simple hash (not cryptographic, just obfuscation for a casual app) ──
async function hashPassword(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw + 'cello-salt-2024'));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── Read/write the JSONBin ──
async function readBin() {
  const res = await fetch(JSONBIN_URL + '/latest', {
    headers: { 'X-Master-Key': _API_KEY }
  });
  if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);
  const data = await res.json();
  return data.record;
}

async function writeBin(data) {
  const res = await fetch(JSONBIN_URL, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': _API_KEY
    },
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error('Could not save data');
  return res.json();
}

// ══════════════════════════════════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════════════════════════════════
let currentUser = null; // { username, passwordHash }

// Restore session from localStorage
(function restoreSession() {
  try {
    const saved = localStorage.getItem('cello_user');
    if (saved) currentUser = JSON.parse(saved);
    if (currentUser) updateMenuForUser();
  } catch(e) {}
})();

function openAuthModal() {
  document.getElementById('authOverlay').classList.remove('hidden');
  document.getElementById('authMsg').textContent = '';
  document.getElementById('authUsername').value = '';
  document.getElementById('authPassword').value = '';
  document.getElementById('authUsername').focus();
}

function closeAuthModal() {
  document.getElementById('authOverlay').classList.add('hidden');
}

let authTab = 'login';
function switchTab(tab) {
  authTab = tab;
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
  document.getElementById('authSubmit').textContent = tab === 'login' ? 'Sign In' : 'Create Account';
  document.getElementById('authMsg').textContent = '';
}

async function submitAuth() {
  const username = document.getElementById('authUsername').value.trim();
  const password = document.getElementById('authPassword').value;
  const msgEl    = document.getElementById('authMsg');
  const btn      = document.getElementById('authSubmit');

  if (!username || !password) {
    msgEl.textContent = 'Please fill in all fields.'; msgEl.className = 'modal-msg err'; return;
  }
  if (username.length < 2) {
    msgEl.textContent = 'Username must be at least 2 characters.'; msgEl.className = 'modal-msg err'; return;
  }

  btn.disabled = true;
  msgEl.textContent = 'Please wait…'; msgEl.className = 'modal-msg';

  try {
    const db = await readBin();
    const users = db.users || {};
    const hash = await hashPassword(password);

    if (authTab === 'register') {
      if (users[username]) {
        msgEl.textContent = 'Username already taken.'; msgEl.className = 'modal-msg err';
        btn.disabled = false; return;
      }
      users[username] = { hash, score: 0 };
      await writeBin({ ...db, users });
      currentUser = { username, hash };
      localStorage.setItem('cello_user', JSON.stringify(currentUser));
      msgEl.textContent = 'Account created!'; msgEl.className = 'modal-msg ok';
      setTimeout(() => { closeAuthModal(); updateMenuForUser(); }, 800);

    } else {
      if (!users[username] || users[username].hash !== hash) {
        msgEl.textContent = 'Incorrect username or password.'; msgEl.className = 'modal-msg err';
        btn.disabled = false; return;
      }
      currentUser = { username, hash };
      localStorage.setItem('cello_user', JSON.stringify(currentUser));
      msgEl.textContent = 'Welcome back!'; msgEl.className = 'modal-msg ok';
      setTimeout(() => { closeAuthModal(); updateMenuForUser(); }, 800);
    }
  } catch(e) {
    msgEl.textContent = `Error: ${e.message}`;
    msgEl.className = 'modal-msg err';
  }
  btn.disabled = false;
}

function logout() {
  currentUser = null;
  localStorage.removeItem('cello_user');
  updateMenuForUser();
}

function updateMenuForUser() {
  const area = document.getElementById('menuUserArea');
  if (currentUser) {
    area.innerHTML = `
      <span class="menu-username">${currentUser.username}</span>
      <button class="menu-logout" onclick="logout()">Sign out</button>`;
  } else {
    area.innerHTML = `<button class="menu-btn" id="menuAuthBtn" onclick="openAuthModal()">Sign In</button>`;
  }
}

// Close modal on overlay click
document.getElementById('authOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('authOverlay')) closeAuthModal();
});

// Enter key submits
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('authOverlay').classList.contains('hidden')) {
    submitAuth();
  }
});

// ══════════════════════════════════════════════════════════════════════════════
// SCORE SUBMISSION
// Submit score to JSONBin whenever a session ends (on page hide or after
// a meaningful number of answers). We update if new score > stored score.
// ══════════════════════════════════════════════════════════════════════════════
async function submitScore() {
  if (!currentUser || score === 0) return;
  try {
    const db = await readBin();
    const users = db.users || {};
    const user = users[currentUser.username];
    if (!user) return;
    if (score > (user.score || 0)) {
      users[currentUser.username] = { ...user, score };
      await writeBin({ ...db, users });
    }
  } catch(e) { /* silent fail */ }
}

// Submit on page visibility change (user switches app/tab)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') submitScore();
});

// Also submit every 10 correct answers
let lastSubmitAt = 0;
function maybeSubmitScore() {
  if (correct > 0 && correct % 10 === 0 && correct !== lastSubmitAt) {
    lastSubmitAt = correct;
    submitScore();
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// LEADERBOARD
// ══════════════════════════════════════════════════════════════════════════════
async function loadLeaderboard() {
  const el = document.getElementById('lbContent');
  el.innerHTML = '<p class="lb-loading">Loading…</p>';
  try {
    const db = await readBin();
    const users = db.users || {};
    const entries = Object.entries(users)
      .map(([name, data]) => ({ name, score: data.score || 0 }))
      .sort((a, b) => b.score - a.score);

    if (entries.length === 0) {
      el.innerHTML = '<p class="lb-empty">No scores yet — be the first!</p>';
      return;
    }

    const rankClass = i => i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    const rankLabel = i => i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}`;
    const isMe = name => currentUser && name === currentUser.username;

    el.innerHTML = entries.map((e, i) => `
      <div class="lb-row ${isMe(e.name) ? 'me' : ''}">
        <span class="lb-rank ${rankClass(i)}">${rankLabel(i)}</span>
        <span class="lb-name ${isMe(e.name) ? 'me' : ''}">${e.name}${isMe(e.name) ? ' ★' : ''}</span>
        <span class="lb-score">${e.score.toLocaleString()}</span>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = '<p class="lb-empty">Could not load scores — check JSONBin setup.</p>';
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// PAGE NAVIGATION
// ══════════════════════════════════════════════════════════════════════════════
function showPage(page) {
  document.getElementById('pageGame').classList.toggle('hidden', page !== 'game');
  document.getElementById('pageLeaderboard').classList.toggle('hidden', page !== 'leaderboard');
  document.getElementById('menuGame').classList.toggle('active', page === 'game');
  document.getElementById('menuLeaderboard').classList.toggle('active', page === 'leaderboard');
  if (page === 'leaderboard') loadLeaderboard();
}
